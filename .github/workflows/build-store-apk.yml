name: Build Store APK

on:
  repository_dispatch:
    types: [build-store-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Extract Store Info
        run: |
          echo "STORE_SLUG=${{ github.event.client_payload.slug }}" >> $GITHUB_ENV
          echo "STORE_NAME=${{ github.event.client_payload.store_name }}" >> $GITHUB_ENV
          echo "STORE_URL=${{ github.event.client_payload.store_url }}" >> $GITHUB_ENV
          echo "LOGO_URL=${{ github.event.client_payload.logo_url }}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=com.reshop.${{ github.event.client_payload.slug }}" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python deps
        run: pip install Pillow requests

      - name: Patch Project Files
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 -c "
          import os, re, glob
          
          pkg = os.environ['PACKAGE_NAME']
          slug = os.environ['STORE_SLUG']
          url = os.environ['STORE_URL']
          repo = os.environ['GITHUB_REPOSITORY']
          name = os.environ['STORE_NAME']

          # 1. Patch build.gradle.app
          path_gradle = 'build.gradle.app'
          if os.path.exists(path_gradle):
              c = open(path_gradle).read()
              # گۆڕینی applicationId لە ناو فایلەکەدا
              c = re.sub(r'applicationId\s+\"[^\"]*\"', f'applicationId \"{pkg}\"', c)
              open(path_gradle, 'w').write(c)
              print('Patched build.gradle.app')

          # 2. Patch AndroidManifest.xml
          path_xml = 'app/src/main/AndroidManifest.xml'
          if os.path.exists(path_xml):
              c = open(path_xml).read()
              c = re.sub(r'package=\"[^\"]*\"', f'package=\"{pkg}\"', c)
              open(path_xml, 'w').write(c)
              print('Patched AndroidManifest.xml')

          # 3. Patch MainActivity.java
          java_files = glob.glob('app/src/main/java/**/MainActivity.java', recursive=True)
          if java_files:
              c = open(java_files[0]).read()
              c = re.sub(r'CONFIG_URL\s*=\s*\"[^\"]*\"', f'CONFIG_URL = \"https://raw.githubusercontent.com/{repo}/main/stores/{slug}/config.json\"', c)
              c = re.sub(r'FALLBACK_URL\s*=\s*\"[^\"]*\"', f'FALLBACK_URL = \"{url}\"', c)
              open(java_files[0], 'w').write(c)
              print('Patched MainActivity.java')

          # 4. Patch strings.xml
          os.makedirs('app/src/main/res/values', exist_ok=True)
          with open('app/src/main/res/values/strings.xml', 'w') as f:
              f.write(f'<resources><string name=\"app_name\" translatable=\"false\">{name}</string></resources>')
          "

      - name: Create Store Config JSON
        run: |
          mkdir -p stores/${{ env.STORE_SLUG }}
          printf '{\n  "store_url": "%s",\n  "store_name": "%s",\n  "slug": "%s",\n  "package": "%s"\n}\n' \
            "${{ env.STORE_URL }}" "${{ env.STORE_NAME }}" "${{ env.STORE_SLUG }}" "${{ env.PACKAGE_NAME }}" \
            > stores/${{ env.STORE_SLUG }}/config.json

      - name: Build Release APK
        run: |
          # بەکارهێنانی ئاڵای -b بۆ دیاریکردنی فایلی build.gradle.app بەتایبەتی
          gradle assembleRelease -b build.gradle.app --no-daemon --stacktrace

      - name: Sign and Finalize APK
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "release" | head -1)
          if [ -z "$APK_PATH" ]; then echo "APK not found"; exit 1; fi
          
          if [ ! -f keystore.jks ]; then
            keytool -genkeypair -v -keystore keystore.jks -alias reshop_key -keyalg RSA -keysize 2048 -validity 10000 -storepass reshop2026 -keypass reshop2026 -dname "CN=ReShop, OU=App, O=ReShop, L=Erbil, S=Kurdistan, C=IQ" -noprompt
          fi
          
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore keystore.jks -storepass reshop2026 -keypass reshop2026 "$APK_PATH" reshop_key
          cp "$APK_PATH" "reshop_${{ env.STORE_SLUG }}.apk"
          echo "FINAL_APK=reshop_${{ env.STORE_SLUG }}.apk" >> $GITHUB_ENV

      - name: Commit Store Config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stores/${{ env.STORE_SLUG }}/config.json
          git diff --staged --quiet || git commit -m "Add config for store: ${{ env.STORE_SLUG }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "store-${{ env.STORE_SLUG }}-v1"
          name: "Store App - ${{ env.STORE_NAME }}"
          files: ${{ env.FINAL_APK }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
